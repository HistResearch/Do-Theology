{{ define "main" }}

<main style="max-width: 860px; margin: 64px auto; padding: 0 24px; font-family: sans-serif; line-height: 1.75;">
  <h1>{{ .Title }}</h1>

  {{ if .Pages }}
    <ul>
      {{ range .Pages.ByWeight }}
        <li>
          <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        </li>
      {{ end }}
    </ul>
  {{ else }}
    <p>No content yet.</p>
  {{ end }}
</main>

{{ end }}
