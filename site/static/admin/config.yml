backend:
  name: git-gateway
  branch: main

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

locale: "zh_Hans"

collections:
  - name: "courses"
    label: "课程 Courses"
    folder: "content/courses"
    create: true
    slug: "{{slug}}"
    path: "{{course}}/{{slug}}"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "课程系列", name: "course", widget: "select", options: ["church-history", "systematic-theology", "discipleship"], default: "church-history" }
      - { label: "课程序号", name: "weight", widget: "number", default: 1 }
      - { label: "简介", name: "description", widget: "text", required: false }
      - { label: "草稿", name: "draft", widget: "boolean", default: false }
      - { label: "正文", name: "body", widget: "markdown", default: "# 🎯 课程目标\n\n# 📖 核心内容\n\n# 🧠 重点总结\n\n# 💬 讨论问题\n\n# 🛠 作业\n" }

  - name: "sermons"
    label: "讲章 Sermons"
    folder: "content/sermons"
    create: true
    slug: "{{slug}}"
    path: "{{series}}/{{slug}}"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "讲章系列", name: "series", widget: "select", options: ["genesis", "romans", "john"], default: "genesis" }
      - { label: "经文", name: "scripture", widget: "string", required: false }
      - { label: "日期", name: "date", widget: "datetime", required: false }
      - { label: "排序", name: "weight", widget: "number", default: 1 }
      - { label: "草稿", name: "draft", widget: "boolean", default: false }
      - { label: "正文", name: "body", widget: "markdown", default: "# 📖 经文\n\n# 🎯 讲道主题\n\n# 🧠 经文讲解\n\n# 🔥 生命应用\n\n# 🙏 祷告回应\n" }

  - name: "reading"
    label: "读书 Reading"
    folder: "content/reading"
    create: true
    slug: "{{slug}}"
    path: "{{book}}/{{slug}}"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "书籍/系列", name: "book", widget: "select", options: ["screwtape-letters", "augustine", "calvin"], default: "screwtape-letters" }
      - { label: "章节/编号", name: "weight", widget: "number", default: 1 }
      - { label: "草稿", name: "draft", widget: "boolean", default: false }
      - { label: "正文", name: "body", widget: "markdown", default: "# 📜 内容摘要\n\n# 🧠 主题分析\n\n# 🎯 神学意义\n\n# 💡 今日应用\n" }

  - name: "pages"
    label: "页面 Pages"
    files:
      - label: "首页"
        name: "home"
        file: "content/_index.md"
        fields:
          - { label: "标题", name: "title", widget: "string", default: "Theology Lab" }
          - { label: "正文", name: "body", widget: "markdown" }

      - label: "关于"
        name: "about"
        file: "content/about.md"
        fields:
          - { label: "标题", name: "title", widget: "string", default: "关于 Theology Lab" }
          - { label: "正文", name: "body", widget: "markdown" }
